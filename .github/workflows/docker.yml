name: Docker

# Build and push the LocalRouter AppImage container to GHCR.
#
# release.yml's post-release job dispatches this workflow after each
# successful release (see the "Trigger Docker image build" step there).
# Releases created via GITHUB_TOKEN do not fan out their `release: published`
# event to other workflows, so the explicit dispatch is required.
#
# The `release: published` trigger is kept for the case of a release being
# published manually through the GH UI (which uses the user's identity, so
# the event does fan out). Manual workflow_dispatch covers re-runs against
# previously released versions.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to package (e.g. 0.1.0, no leading v)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/localrouter/localrouter

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_PRERELEASE="false"
          else
            # Strip the leading 'v' from the release tag (e.g. v0.1.0 -> 0.1.0)
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            IS_PRERELEASE="${{ github.event.release.prerelease }}"
          fi
          if [ -z "$VERSION" ]; then
            echo "Error: could not resolve version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "appimage_url=https://github.com/${{ github.repository }}/releases/download/v${VERSION}/LocalRouter_${VERSION}_amd64.AppImage" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (prerelease=$IS_PRERELEASE)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAGS="${IMAGE_NAME}:${VERSION}"
          TAGS="${TAGS},${IMAGE_NAME}:v${VERSION}"
          # Only mark as :latest for stable (non-prerelease) builds.
          if [ "${{ steps.ver.outputs.is_prerelease }}" != "true" ]; then
            TAGS="${TAGS},${IMAGE_NAME}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Tags: $TAGS"

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            APPIMAGE_URL=${{ steps.ver.outputs.appimage_url }}
            VERSION=${{ steps.ver.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.description=LocalRouter — local OpenAI-compatible API gateway with multi-provider routing and MCP integration

      - name: Summary
        run: |
          echo "✅ Pushed ${IMAGE_NAME}:${{ steps.ver.outputs.version }}"
          echo "Tags: ${{ steps.tags.outputs.tags }}"
          echo "Platforms: linux/amd64, linux/arm64"
